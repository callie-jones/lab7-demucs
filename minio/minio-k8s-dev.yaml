# Minio for local Docker Desktop / minikube (namespace + deployment + service).
# namespace minio-ns, service name minio-proj, ports 9000/9001.
# Credentials match rest/worker defaults: rootuser / rootpass123
---
apiVersion: v1
kind: Namespace
metadata:
  name: minio-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-proj
  namespace: minio-ns
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
          - server
          - /data
          - --console-address
          - ":9001"
        env:
          - name: MINIO_ROOT_USER
            value: "rootuser"
          - name: MINIO_ROOT_PASSWORD
            value: "rootpass123"
        ports:
          - containerPort: 9000
            name: api
          - containerPort: 9001
            name: console
        volumeMounts:
          - name: data
            mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio-proj
  namespace: minio-ns
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
